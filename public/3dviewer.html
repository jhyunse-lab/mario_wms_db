<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>WMS 3D Viewer by Jhs</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        canvas {
            display: block;
        }

        #info,
        #status {
            display: none;
        }

        /* 우측 패널 */
        #rightPanel {
            position: fixed;
            top: 0;
            right: 0;
            width: 380px;
            height: 100vh;
            background: radial-gradient(circle at top left, #1f2933 0, #050816 55%);
            color: #f9fafb;
            z-index: 20;
            padding: 14px 14px 10px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(148, 163, 184, 0.4);
            box-shadow: -8px 0 20px rgba(0, 0, 0, 0.6);
            overflow: auto;
            min-width: 260px;
            max-width: 700px;
        }

        /* 패널 폭 조절용 드래그 바 */
        #panelResizer {
            position: absolute;
            left: -4px;
            top: 0;
            width: 8px;
            height: 100%;
            cursor: ew-resize;
            z-index: 21;
            background: transparent;
        }

        #panelHeader {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
        }

        #panelTitle {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        #panelTitle span {
            font-size: 11px;
            color: #9ca3af;
            margin-left: 4px;
            font-weight: 400;
        }

        #panelSub {
            font-size: 11px;
            color: #9ca3af;
        }

        #legend {
            margin-top: 2px;
            font-size: 10px;
            color: #9ca3af;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 8px;
            align-items: center;
        }

        .legend-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 4px;
        }

        #colorModeRow,
        #opacityRow,
        #labelToggleRow,
        #frameToggleRow,
        #ksRow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 6px;
        }

        #colorModeRow>div,
        #frameToggleRow>div {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #colorModeRow label,
        #frameToggleRow label,
        #ksRow label {
            font-size: 11px;
        }

        #opacityRow input[type="range"] {
            width: 160px;
        }

        /* 선택 카드 */
        #selectionCard {
            margin-top: 8px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(56, 189, 248, 0.6);
            font-size: 13px;
            line-height: 1.6;
        }

        #selectionCardTitle {
            font-size: 14px;
            font-weight: 700;
            color: #fcd34d;
            margin-bottom: 4px;
        }

        /* 업로드 영역 */
        #uploadArea {
            margin-top: 8px;
            margin-bottom: 6px;
            padding: 8px;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px dashed rgba(148, 163, 184, 0.7);
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 11px;
            color: #e5e7eb;
        }

        .uploadLabel {
            font-size: 10px;
            color: #9ca3af;
        }

        input[type="file"] {
            width: 100%;
            font-size: 11px;
            color: #e5e7eb;
        }

        input[type="file"]::file-selector-button {
            padding: 4px 10px;
            border-radius: 999px;
            border: none;
            background: #2563eb;
            color: #f9fafb;
            font-size: 11px;
            cursor: pointer;
            margin-right: 6px;
        }

        /* 필터 & 검색 */
        #filterRow {
            display: flex;
            gap: 6px;
            margin-bottom: 4px;
        }

        #manufacturerFilter,
        #partnerFilter {
            flex: 1;
            padding: 4px 6px;
            font-size: 11px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.6);
            background: rgba(15, 23, 42, 0.9);
            color: #e5e7eb;
            outline: none;
        }

        #searchWrapper {
            margin-top: 2px;
            position: relative;
            width: 100%;
        }

        #searchBox {
            width: 100%;
            padding: 6px 22px 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.6);
            background: rgba(15, 23, 42, 0.9);
            color: #e5e7eb;
            font-size: 12px;
            outline: none;
        }

        #searchBox::placeholder {
            color: #6b7280;
        }

        #clearSearch {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: none;
            background: #6b7280;
            color: #f9fafb;
            font-size: 10px;
            line-height: 14px;
            padding: 0;
            cursor: pointer;
            display: none;
        }

        /* 테이블 */
        #tableContainer {
            margin-top: 8px;
            flex: 1;
            overflow: hidden;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(31, 41, 55, 0.9);
            display: flex;
            flex-direction: column;
        }

        #tableHeader {
            padding: 6px 10px;
            font-size: 11px;
            color: #9ca3af;
            border-bottom: 1px solid rgba(31, 41, 55, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #tableHeader span strong {
            color: #e5e7eb;
        }

        #exportBtn {
            padding: 3px 8px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.7);
            background: rgba(15, 23, 42, 0.9);
            color: #e5e7eb;
            font-size: 10px;
            cursor: pointer;
        }

        #inventoryTable {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            color: #e5e7eb;
        }

        #inventoryTable thead {
            position: sticky;
            top: 0;
            background: rgba(17, 24, 39, 0.98);
            z-index: 1;
        }

        #inventoryTable th,
        #inventoryTable td {
            padding: 4px 6px;
            border-bottom: 1px solid rgba(31, 41, 55, 0.9);
            text-align: left;
            white-space: nowrap;
        }

        #inventoryTable tbody tr {
            cursor: pointer;
            transition: background 0.12s ease;
        }

        #inventoryTable tbody tr:hover {
            background: rgba(55, 65, 81, 0.6);
        }

        .highlightRow {
            background: rgba(56, 189, 248, 0.25) !important;
        }

        #tableScroll {
            flex: 1;
            overflow: auto;
        }

        #tableScroll::-webkit-scrollbar {
            width: 6px;
        }

        #tableScroll::-webkit-scrollbar-thumb {
            background: rgba(55, 65, 81, 0.9);
            border-radius: 999px;
        }

        /* 우클릭 메뉴 */
        #contextMenu {
            position: fixed;
            display: none;
            background: #111827;
            color: #f9fafb;
            border: 1px solid #4b5563;
            border-radius: 6px;
            font-size: 12px;
            z-index: 9999;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            min-width: 140px;
        }

        .contextItem {
            padding: 8px 12px;
            cursor: pointer;
        }

        .contextItem:hover {
            background: #1f2937;
        }
    </style>
    <script type="module" src="./firebase-service.js"></script>
</head>

    <div id="status"></div>

                    <div class="abc-legend-item" data-grade="B" style="cursor:pointer; display:flex; align-items:center; gap:4px; color:#9ca3af; opacity:0.5;"><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:#facc15;"></span> B등급 (25년)</div>

    <script>
        // ===== 0. 위치 코드 변환 =====
        function normalizeLocationCode(raw) {
            if (!raw) return "";
            const s = raw.toString().trim();

            // AA 전용: AA03012 → AA-03-01-2
            if (s.startsWith("AA") && s.length === 7 && /^\d{5}$/.test(s.slice(2))) {
                const zone = "AA";
                const row = s.slice(2, 4);
                const col = s.slice(4, 6);
                const lvl = s.slice(6);
                return `${zone}-${row}-${col}-${lvl}`;
            }

            // 일반: B0206041 → B02-06-04-1
            const regex = /^[A-Z][0-9]{7}$/;
            if (!regex.test(s)) {
                return s;
            }
            const zone = s.slice(0, 3);
            const row = s.slice(3, 5);
            const col = s.slice(5, 7);
            const lvl = s.slice(7);
            return `${zone}-${row}-${col}-${lvl}`;
        }

        // ===== 1. THREE 기본 세팅 =====
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050816);

        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(40, 26, 52);
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.target.set(0, 5, 0);

        // 마우스 설정: 가운데 = 팬, 오른쪽 = 우클릭 메뉴만 사용
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.ROTATE,
            MIDDLE: THREE.MOUSE.PAN,
            RIGHT: null
        };

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        function createTextSprite(text, options = {}) {
            const {
                fontSize = 48,
                fontFace = "Segoe UI",
                textColor = "#000000",
                bgColor = "#FFE066"
            } = options;

            const w = 256, h = 128;
            const canvas = document.createElement("canvas");
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext("2d");

            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, w, h);

            ctx.font = `bold ${fontSize}px ${fontFace}`;
            ctx.fillStyle = textColor;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, w / 2, h / 2);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            return sprite;
        }

        // ===== 3. 랙 생성 =====
        function createRackFromFootprint(params) {

            if (withAisles) {
                const logicalRows = spans;
                const cycles = logicalRows / 2;
                const d_shelf = depth / (cycles * (2 + aisleRatio));
                const d_aisle = d_shelf * aisleRatio;

                shelfDepth = d_shelf;
                aisleDepth = d_aisle;

                let curZ = baseZ;
                zBoundaries.push(curZ);

                for (let c = 0; c < cycles; c++) {
                    curZ += shelfDepth;
                    zBoundaries.push(curZ);
                    rowCenters.push(curZ - shelfDepth / 2);

                    curZ += shelfDepth;
                    zBoundaries.push(curZ);
                    rowCenters.push(curZ - shelfDepth / 2);

                    curZ += d_aisle;
                    zBoundaries.push(curZ);
                    aisleCenters.push(curZ - d_aisle / 2);
                }
            } else {
                const bayDepth = depth / spans;
                shelfDepth = bayDepth;
                let curZ = baseZ;

            // 기둥
            for (let i = 0; i <= cols; i++) {
                const x = baseX + i * bayWidth;

                for (let j = 0; j < zBoundaries.length; j++) {
                    if (isBC && j === zBoundaries.length - 1) continue;

                    if (isAorD) {
                        const isEdgeRow = (j === 0 || j === zBoundaries.length - 1);
                        if (!isEdgeRow && (j % 2 !== 0)) continue;
                    }

                    const z = zBoundaries[j];
                    const postMat = metalPostMaterialTemplate.clone();
                    postMat.color.set(postBaseColor);
                    const post = new THREE.Mesh(POST_GEOMETRY, postMat);

            const BOX_HEIGHT = levelSpacing * 0.9;

            const BOX_DEPTH = shelfDepthEffective * 0.9;

            const rowCount = rowCenters.length;

            for (let level = 0; level < levels; level++) {

                        const shelf = new THREE.Mesh(SHELF_GEOMETRY, shelfMat);
                        shelf.position.set(colCenterX, shelfY, zCenter);
                        shelf.userData.baseColor = shelfMat.color.clone();
                        shelf.userData.isKS = false;

                        scene.add(shelf);
                        allShelves.push(shelf);

                        let rowIdx = (rowCount + rowOffset) - idx;
                        let colIdx;
                        const tierIdx = level + 1;

                        if (codePrefix === "AA") {
                            colIdx = 1;
                        } else if (["A04", "A03", "A02", "A01"].includes(codePrefix)) {
                            const m = codePrefix.match(/\d+/);
                            colIdx = m ? parseInt(m[0], 10) : (col + 1);
                        } else if (codePrefix === "D01") {
                            colIdx = col + 1;
                        } else {
                            colIdx = col + 1;

                        const code =
                            codePrefix + "-" +

                        shelf.userData.code = code;

        // A02/A03를 A01 쪽으로 살짝 이동
        (function adjustA02A03() {
            const a1 = zones.find(z => z.codePrefix === "A01");
            const a2 = zones.find(z => z.codePrefix === "A02");
            const a3 = zones.find(z => z.codePrefix === "A03");

            if (a1.centerX > a2.centerX) a2.centerX += shift; else a2.centerX -= shift;

        function rebuildFilters() {
            const manuSet = new Set();
            const partnerSet = new Set();
            inventoryData.forEach(row => {
                if (row._MANUFACTURER) manuSet.add(row._MANUFACTURER);
                if (row._PARTNER) partnerSet.add(row._PARTNER);
            });
            
            // Add all partners from partnerData mapping to show in dropdown
            if (window.partnerData) {
                Object.values(window.partnerData).forEach(p => {
                    if (p) partnerSet.add(p);
                });
            };

            const manuArr = Array.from(manuSet).sort();
            const partnerArr = Array.from(partnerSet).sort();

            manufacturerFilterEl.innerHTML = '<option value="__ALL__">제조사: 전체</option>';
            manuArr.forEach(m => {
                const opt = document.createElement("option");
                opt.value = m;
                opt.textContent = m;
                manufacturerFilterEl.appendChild(opt);
            });

            partnerFilterEl.innerHTML = '<option value="__ALL__">거래처: 전체</option>';
            partnerArr.forEach(p => {
                const opt = document.createElement("option");
                opt.value = p;
                opt.textContent = p;
                partnerFilterEl.appendChild(opt);
            });

            currentManufacturerFilter = "__ALL__";
            currentPartnerFilter = "__ALL__";
        }

        function rowMatchesFilter(row, textFilter, manuFilter, partnerFilter) {
            const loc = (row._LOCATION || "").toString();
            const item = (row._ITEM_NAME || "").toString();
            const code = (row._ITEM_CODE || "").toString();
            const manu = (row._MANUFACTURER || "").toString();
            const partn = (row._PARTNER || "").toString();
            const cust = (row._CUSTOMER || "").toString();

            if (typeof colorMode !== 'undefined' && colorMode === "issue") {
                if (!window.itemsWithIssues || !window.itemsWithIssues.has(code)) return false;
            }
            if (manuFilter && manuFilter !== "__ALL__" && manu !== manuFilter) return false;
            if (partnerFilter && partnerFilter !== "__ALL__" && partn !== partnerFilter) return false;
            
            if (currentAbcFilter && currentAbcFilter !== "__ALL__") {
                const itemCode = (row._ITEM_CODE || "").toString().trim();
                const lastDate = window.shipmentData ? window.shipmentData[itemCode] : null;
                let grade = "D";
                if (lastDate) {
                    const yr = parseInt(lastDate.substring(0, 4));
                    if (yr >= 2026) grade = "A";
                    else if (yr === 2025) grade = "B";
                    else if (yr <= 2024 && yr > 0) grade = "C";
                }
                if (grade !== currentAbcFilter) return false;
            }

            if (textFilter) {
                const hay = (loc + " " + item + " " + code + " " + manu + " " + partn + " " + cust).toLowerCase();
                if (!hay.includes(textFilter.toLowerCase())) return false;
            }
            return true;
        }

        function updateInventoryTable() {
            const tbody = document.querySelector("#inventoryTable tbody");
            tbody.innerHTML = "";

            let filtered = inventoryData.filter(row =>
                rowMatchesFilter(row, currentTextFilter, currentManufacturerFilter, currentPartnerFilter)

            if (priorityLocation) {
                filtered = filtered.slice().sort((a, b) => {
                    const aPri = (a._LOCATION === priorityLocation) ? 0 : 1;
                    const bPri = (b._LOCATION === priorityLocation) ? 0 : 1;
                    if (aPri !== bPri) return aPri - bPri;
                    if (a._LOCATION !== b._LOCATION) return a._LOCATION.localeCompare(b._LOCATION);
                    return 0;
                });
            }

            lastFilteredRows = filtered;

            filtered.forEach(row => {
                const loc = row._LOCATION || "";
                const item = row._ITEM_NAME || "";
                const manu = row._MANUFACTURER || "";

        // ===== 6. 박스 생성 (다품목 박스 분할) =====
        function rebuildBinsFromInventory() {
            allBins.forEach(b => {
                scene.remove(b);
                if (b.geometry) b.geometry.dispose();
                if (b.material) b.material.dispose();
            });
            allBins.length = 0;
            if (typeof issueIndicators !== 'undefined') {
                issueIndicators.forEach(ind => {
                    scene.remove(ind);
                    if(ind.geometry) ind.geometry.dispose();
                    if(ind.material) ind.material.dispose();
                });
                issueIndicators.length = 0;
            }


            clearSelectionOnly(); // 선택만 리셋, KS 색상은 유지

            // RCV 아이템 풀 준비
            let rcvItemPool = [];
            Object.keys(inventoryByLoc).forEach(k => {
                if (k.toUpperCase().includes("RCV")) {
                    rcvItemPool.push(...inventoryByLoc[k]);
                }
            });

            // 2. 슬롯 순회
            Object.keys(locationSlots).forEach(loc => {
                let rows;
                if (loc.startsWith("RCV")) {
                    // RCV 슬롯이면 풀에서 일부 가져옴 (예: 슬롯당 N개)
                    // 여기서는 단순화: 풀에 남은게 있으면 이 슬롯에 할당
                    // 균등 분배를 위해: poolSize / slotCount
                    const rcvSlotKeys = Object.keys(locationSlots).filter(k => k.startsWith("RCV"));
                    const slotCount = rcvSlotKeys.length;
                    const itemsPerSlot = Math.ceil(rcvItemPool.length / slotCount) || 1;

                    rows = rcvItemPool.splice(0, itemsPerSlot);
                } else {
                    rows = inventoryByLoc[loc];
                }

                if (!rows || rows.length === 0) return;
                const slot = locationSlots[loc];


                const valid = rows.filter(r => Number(r._QTY || 0) > 0);
                if (valid.length === 0) return;

                const n = valid.length;
                const gridCols = Math.ceil(Math.sqrt(n));
                const gridRows = Math.ceil(n / gridCols);

                const subWidth = (slot.boxWidth / gridCols) * 0.9;
                const subDepth = (slot.boxDepth / gridRows) * 0.9;
                const subHeight = slot.boxHeight;

                for (let i = 0; i < n; i++) {
                    const r = valid[i];
                    const gc = i % gridCols;
                    const gr = Math.floor(i / gridCols);

                    const localX = (gc - (gridCols - 1) / 2) * (slot.boxWidth / gridCols);
                    const localZ = (gr - (gridRows - 1) / 2) * (slot.boxDepth / gridRows);

                    let color;
                    if (colorMode === "abc") {
                        const itemCode = (r._ITEM_CODE || "").toString().trim();
                        const lastDate = window.shipmentData ? window.shipmentData[itemCode] : null;
                        if (lastDate) {
                            const yr = parseInt(lastDate.substring(0, 4));
                            if (yr >= 2026) color = new THREE.Color(0x22c55e);
                            else if (yr === 2025) color = new THREE.Color(0xfacc15);
                            else if (yr <= 2024 && yr > 0) color = new THREE.Color(0x3b82f6); // Blue for C
                            else color = new THREE.Color(0xef4444); // Red for D
                        } else {
                            color = new THREE.Color(0xef4444); // Red for D
                        } // Red for D (No history)
                    } else {
                        const itemCode = (r._ITEM_CODE || "").toString().trim();
                        const pKey = (window.partnerData && window.partnerData[itemCode]) ? window.partnerData[itemCode] : (r._PARTNER || "");
                        const key = (colorMode === "manufacturer") ? (r._MANUFACTURER || "") : pKey;
                        color = getOwnerColor(key);
                    }

                    if (colorMode === "issue") {
                        const key = (r._ITEM_CODE || r._ITEM_NAME || "").toString();
                        color = getOwnerColor(key);
                    }
                    
                    const geo = new THREE.BoxGeometry(subWidth, subHeight, subDepth);
                    const mat = new THREE.MeshStandardMaterial({
                        color: color,
                        metalness: 0.2,
                        roughness: 0.6,
                        emissive: new THREE.Color(0x000000),
                        emissiveIntensity: 0.0,
                        transparent: (boxOpacity < 1.0),
                        opacity: boxOpacity
                    });

                    const box = new THREE.Mesh(geo, mat);
                    box.position.set(slot.x + localX, slot.y, slot.z + localZ);
                    scene.add(box);

                    

                    box.userData.rowRef = r;
                    allBins.push(box);
                }
            });

            applyFiltersToBins();
            if (ksVisible) applyKSHighlight(true);
            if (typeof priorityLocation !== 'undefined' && priorityLocation) {
                focusItemIn3D(priorityLocation, typeof currentItemCodeForMemo !== 'undefined' ? currentItemCodeForMemo : "");
            }
        }

        function applyFiltersToBins() {
            allBins.forEach(box => {
                const row = box.userData.rowRef;
                if (!row) { box.visible = false; return; }
                box.visible = rowMatchesFilter(row, currentTextFilter, currentManufacturerFilter, currentPartnerFilter);
                if (box.userData.indicator) {

                }

            });
        }

                b.material.transparent = (boxOpacity < 1.0);
                b.material.opacity = boxOpacity;
                if (b.userData.indicator && b.userData.indicator.material) {
                    b.userData.indicator.material.transparent = (boxOpacity < 1.0);
                    b.userData.indicator.material.opacity = boxOpacity;
                    b.userData.indicator.material.needsUpdate = true;

                b.material.needsUpdate = true;
            });
        });

        // ===== 7. 선택/하이라이트 & 우클릭 메뉴 =====
        const raycaster = new THREE.Raycaster();

        let selectedBin = null;

        let selectionMode = "item";

        function clearSelectionOnly() {
            // 품목 선택 해제
            if (selectedOutline) {

        function focusItemIn3D(location, itemCode) {
            const box = allBins.find(b => {
                const r = b.userData.rowRef;
                if (!r) return false;
                if (r._LOCATION !== location) return false;
                if (itemCode && r._ITEM_CODE !== itemCode) return false;
                return true;
            });
            if (!box) return;

            if (selectedOutline) {
                scene.remove(selectedOutline);
                if (selectedOutline.geometry) selectedOutline.geometry.dispose();
                if (selectedOutline.material) selectedOutline.material.dispose();
                selectedOutline = null;
            }
            if (selectedBin && selectedBin.material) {
                selectedBin.material.emissive.setHex(0x000000);
                selectedBin.material.emissiveIntensity = 0.0;
            }

            selectedBin = box;
            const edgeGeo = new THREE.EdgesGeometry(box.geometry);
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x22c55e });
            const outline = new THREE.LineSegments(edgeGeo, edgeMat);
            outline.scale.set(1.03, 1.03, 1.03);
            outline.position.copy(box.position);
            outline.quaternion.copy(box.quaternion);
            scene.add(outline);
            selectedOutline = outline;

            if (selectedBin.material && selectedBin.material.emissive) {
                selectedBin.material.emissive.setHex(0x22c55e);
                selectedBin.material.emissiveIntensity = 0.5;
            }
        }

        function focusShelfIn3D(shelf) {

            selLocEl.textContent = "로케이션: " + code;

            const rows = inventoryByLoc[code] || [];
            const valid = rows.filter(r => Number(r._QTY || 0) > 0);

                selManuEl.textContent = "제조사명: (다수)";
                selPartEl.textContent = "거래처명: (다수)";

            highlightTableRow(code, "");

        function onMouseDown(event) {
            if (event.target !== renderer.domElement) return; // UI 위 클릭 무시
            if (event.button !== 0) return; // 좌클릭만
            const panelRect = document.getElementById("rightPanel").getBoundingClientRect();
            if (event.clientX >= panelRect.left) return;

            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if (selectionMode === "item") {
                const intersects = raycaster.intersectObjects(allBins).filter(hit => hit.object.visible);
                if (intersects.length === 0) return;
                const box = intersects[0].object;
                const row = box.userData.rowRef;
                if (!row) return;
                selectItemFromRow(row);
            } else {
                const intersects = raycaster.intersectObjects(allShelves).filter(hit => hit.object.visible);
                if (intersects.length === 0) return;
                const shelf = intersects[0].object;
                focusShelfIn3D(shelf);
            }
        }
        window.addEventListener("mousedown", onMouseDown, false);

        // 빈 공간 더블클릭 시 선택 해제
        window.addEventListener("dblclick", (event) => {
            const panelRect = document.getElementById("rightPanel").getBoundingClientRect();
            if (event.clientX >= panelRect.left) return; // 패널 위 더블클릭은 무시

            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const hitsBins = raycaster.intersectObjects(allBins).filter(hit => hit.object.visible);
            const hitsShelves = raycaster.intersectObjects(allShelves).filter(hit => hit.object.visible);
            if (hitsBins.length === 0 && hitsShelves.length === 0) {
                clearAllSelection();
            }
        });

        // 라벨 / 랙 프레임 토글
        

        // ===== 8. 영역 강조 (Highlight Areas: KS & GNN) =====
        let highlightsVisible = false;
        let highlightMeshes = [];

        // 설정 정의
        const highlightDefs = [
            {
                label: "경신",
                colorHex: "#ea580c",     // Orange
                postColorHex: "#ff4500", // Red-Orange
                bgColor: "rgba(234, 88, 12, 0.9)",
                zones: [
                    { zone: "B01", rowMin: 15, rowMax: 22 },

                ]
            },
            {
                label: "GNN",

                postColorHex: "#3b82f6", // Bright Blue

        function clearHighlights() {
            highlightMeshes.forEach(m => {
                scene.remove(m);
                if (m.geometry) m.geometry.dispose();
                if (m.material) m.material.dispose();
            });
            highlightMeshes = [];
        }

        document.getElementById("toggleKS").addEventListener("change", updateHighlights);
        document.getElementById("toggleGNN").addEventListener("change", updateHighlights);

        function updateHighlights() {
            const ksOn = document.getElementById("toggleKS").checked;
            const gnnOn = document.getElementById("toggleGNN").checked;
            applyZoneHighlights(ksOn, gnnOn);
        }

        function applyZoneHighlights(ksOn, gnnOn) {
            clearHighlights();

            // 1. Reset color for ALL relevant zones first
            allShelves.forEach(s => {
                if (s.userData.isHighlight) {
                    s.userData.isHighlight = false;
                    if (s === selectedShelf) s.material.color.set("#facc15");
                    else s.material.color.copy(s.userData.baseColor);
                }
            });
            allPosts.forEach(p => {
                if (p.userData.isHighlight) {
                    p.userData.isHighlight = false;
                    p.material.color.copy(p.userData.baseColor);
                }
            });

            highlightDefs.forEach(conf => {
                // Check visibility based on label
                let isVisible = false;
                if (conf.label === "경신" && ksOn) isVisible = true;
                if (conf.label === "GNN" && gnnOn) isVisible = true;

                if (!isVisible) return;

                processHighlightConf(conf);
            });
        }

        function processHighlightConf(conf) {
            conf.zones.forEach(zDef => {
                const shelvesInZone = allShelves.filter(s =>
                    s.userData.zone === zDef.zone &&
                    s.userData.rowIdx >= zDef.rowMin &&
                    s.userData.rowIdx <= zDef.rowMax
                );

                if (shelvesInZone.length === 0) return;

                let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
                let maxY = 0;

                shelvesInZone.forEach(s => {
                    const b = new THREE.Box3().setFromObject(s);
                    minX = Math.min(minX, b.min.x);
                    maxX = Math.max(maxX, b.max.x);
                    minZ = Math.min(minZ, b.min.z);
                    maxZ = Math.max(maxZ, b.max.z);
                    maxY = Math.max(maxY, b.max.y);

                    s.userData.isHighlight = true;
                    if (s !== selectedShelf) {
                        s.material.color.set(0x999999);
                    }
                });

                allPosts.forEach(p => {
                    const pos = p.position;
                    if (pos.x >= minX && pos.x <= maxX && pos.z >= minZ && pos.z <= maxZ) {
                        p.userData.isHighlight = true;
                        p.material.color.set(0x999999);
                    }
                });

                // --- 시각 효과 생성 ---
                const centerX = (minX + maxX) / 2;
                const centerZ = (minZ + maxZ) / 2;
                const width = (maxX - minX) * 1.05;
                const depth = (maxZ - minZ) * 1.05;
                let height = maxY + 2.0;
                if (zDef.zone === "A01" || zDef.zone === "A02" || zDef.zone === "AA") {
                    height = 5.13;
                }

                // 1. 바닥 (Floor)
                const floorGeo = new THREE.PlaneGeometry(width, depth);
                const floorMat = new THREE.MeshBasicMaterial({
                    color: conf.colorHex,
                    transparent: true,
                    opacity: 0.25,
                    side: THREE.DoubleSide
                });
                const floorMesh = new THREE.Mesh(floorGeo, floorMat);
                floorMesh.rotation.x = -Math.PI / 2;
                floorMesh.position.set(centerX, 0.015, centerZ);
                scene.add(floorMesh);
                highlightMeshes.push(floorMesh);

                // 2. 기둥 (Pillars)
                const postThick = 0.2;
                const postGeo = new THREE.BoxGeometry(postThick, height, postThick);
                const postMat = new THREE.MeshBasicMaterial({ color: conf.postColorHex });

                const corners = [
                    { x: minX, z: minZ }, { x: maxX, z: minZ },
                    { x: maxX, z: maxZ }, { x: minX, z: maxZ }
                ];
                corners.forEach(c => {
                    const p = new THREE.Mesh(postGeo, postMat);
                    p.position.set(c.x, height / 2, c.z);
                    scene.add(p);
                    highlightMeshes.push(p);
                });

                // 3. 와이어프레임
                const boxGeo = new THREE.BoxGeometry(width, height, depth);
                const edges = new THREE.EdgesGeometry(boxGeo);
                const lineMat = new THREE.LineBasicMaterial({ color: conf.postColorHex, linewidth: 2 });
                const wireMesh = new THREE.LineSegments(edges, lineMat);
                wireMesh.position.set(centerX, height / 2, centerZ);
                scene.add(wireMesh);
                highlightMeshes.push(wireMesh);

                // 4. 상단 커버
                const lidGeo = new THREE.PlaneGeometry(width, depth);
                const lidMat = new THREE.MeshBasicMaterial({
                    color: conf.colorHex,
                    transparent: true,
                    opacity: 0.15,
                    side: THREE.DoubleSide
                });
                const lidMesh = new THREE.Mesh(lidGeo, lidMat);
                lidMesh.rotation.x = -Math.PI / 2;
                lidMesh.position.set(centerX, height, centerZ);
                scene.add(lidMesh);
                highlightMeshes.push(lidMesh);

                // 5. 텍스트 라벨
                const label = createTextSprite(conf.label, {
                    fontSize: 100,
                    textColor: "#ffffff",
                    bgColor: conf.bgColor
                });
                label.position.set(centerX, height + 2.0, centerZ);
                label.scale.set(4.0, 2.0, 1.0);
                scene.add(label);
                highlightMeshes.push(label);
            });
        }
        // ===== 9. 엑셀 내보내기 =====
        document.getElementById("exportBtn").addEventListener("click", () => {
            if (!lastFilteredRows || lastFilteredRows.length === 0) {
                alert("내보낼 데이터가 없습니다. (필터 결과 0건)");
                return;
            }
            const exportData = lastFilteredRows.map(r => ({
                로케이션: r._LOCATION || "",
                품목코드: r._ITEM_CODE || "",
                품목명: r._ITEM_NAME || "",
                제조사명: r._MANUFACTURER || "",
                거래처명: r._PARTNER || "",
                고객명: r._CUSTOMER || "",
                수량: r._QTY ?? 0
            }));
            let fileName = prompt("저장할 파일명을 입력하세요 (확장자 제외):", "WMS3D_Export");
            if (fileName === null) return; // User cancelled
            fileName = fileName.trim() || "WMS3D_Export";
            if (!fileName.endsWith('.xlsx')) fileName += '.xlsx';

            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, fileName);
        });

        // ===== 10. 패널 폭 드래그 조절 =====
        (function setupPanelResize() {
            const rightPanel = document.getElementById("rightPanel");
            const resizer = document.getElementById("panelResizer");
            let isResizing = false;

            resizer.addEventListener("mousedown", (e) => {
                isResizing = true;
                document.body.style.cursor = "ew-resize";
                e.preventDefault();
            });

            window.addEventListener("mousemove", (e) => {
                if (!isResizing) return;
                const min = 260;
                const max = 700;
                const newWidth = window.innerWidth - e.clientX;
                const clamped = Math.max(min, Math.min(max, newWidth));
                rightPanel.style.width = clamped + "px";
            });

            window.addEventListener("mouseup", () => {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = "default";
                }
            });
        })();

        // ===== 11. 렌더 루프 =====
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (selectedBin && selectedBin.material) {
                const t = performance.now() / 1000;
                const phase = (Math.sin(t * 4.0) + 1) / 2;
                const intensity = 0.3 + 0.4 * phase;
                selectedBin.material.emissiveIntensity = intensity;
                if (selectedOutline) {
                    const base = 1.03;
                    const extra = 0.02 * phase;
                    selectedOutline.scale.set(base + extra, base + extra, base + extra);
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener("resize", () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

// ===== 9. Memo and Issue Management Logic =====
        const memoModal = document.getElementById("memoModal");
        const closeMemoBtn = document.getElementById("closeMemoBtn");
        const openMemoBtn = document.getElementById("openMemoBtn");
        const saveMemoBtn = document.getElementById("saveMemoBtn");
        const memoDate = document.getElementById("memoDate");
        const memoText = document.getElementById("memoText");
        const memoAuthor = document.getElementById("memoAuthor");
        const memoHistoryList = document.getElementById("memoHistoryList");
        
        let currentItemCodeForMemo = null;

        function updateMemoBtnUI() {
            if (!currentItemCodeForMemo || !openMemoBtn) return;
            if (window.itemsWithIssues && window.itemsWithIssues.has(currentItemCodeForMemo)) {
                openMemoBtn.textContent = "🚨 특이사항 있음";
                openMemoBtn.style.background = "#ef4444";
                openMemoBtn.style.color = "#fff";
                openMemoBtn.style.border = "none";
            } else {
                openMemoBtn.textContent = "📝 메모 작성";
                openMemoBtn.style.background = "#374151";
                openMemoBtn.style.color = "#e5e7eb";
                openMemoBtn.style.border = "1px solid #4b5563";
            }
        }

        closeMemoBtn.addEventListener("click", () => {
            memoModal.style.display = "none";
        });

        
        function renderMemoList(memos) {
            memoHistoryList.innerHTML = "";
            if (memos.length === 0) {
                memoHistoryList.innerHTML = '<div style="color:#6b7280; font-size:13px; text-align:center; padding: 20px 0;">등록된 이력이 없습니다.</div>';
            } else {
                memos.forEach(memo => {
                    const div = document.createElement("div");
                    div.style.background = "#f9fafb";
                    div.style.padding = "14px";
                    div.style.borderRadius = "8px";
                    div.style.border = "1px solid #e5e7eb";
                    div.style.borderLeft = "4px solid #f472b6";
                    
                    const header = document.createElement("div");
                    header.style.display = "flex";
                    header.style.justifyContent = "space-between";
                    header.style.alignItems = "flex-start";
                    header.style.marginBottom = "8px";
                    header.innerHTML = `<div style="font-size:12px; color:#4b5563; font-weight:500;">${memo.date} ${memo.author ? " | " + memo.author : ""}</div>`;
                    
                    const actions = document.createElement("div");
                    const editBtn = document.createElement("button");
                    editBtn.textContent = "수정";
                    editBtn.style = "background:none; border:none; color:#2563eb; cursor:pointer; font-size:12px; padding:0 4px; font-weight:500;";
                    
                    const delBtn = document.createElement("button");
                    delBtn.textContent = "삭제";
                    delBtn.style = "background:none; border:none; color:#ef4444; cursor:pointer; font-size:12px; padding:0 4px; font-weight:500;";
                    
                    delBtn.onclick = async () => {
                        if(confirm("이 이력을 삭제하시겠습니까?")) {
                            delBtn.textContent = "...";
                            await window.deleteIssueMemo(memo.id, currentItemCodeForMemo, memo.imagePath || "");
                            if (window.fetchIssueMemos) {
                                const updatedMemos = await window.fetchIssueMemos(currentItemCodeForMemo);
                                renderMemoList(updatedMemos);
                            }
                        }
                    };
                    
                    editBtn.onclick = () => {
                        memoDate.value = memo.date;
                        memoText.value = memo.text;
                        memoAuthor.value = memo.author || "";
                        saveMemoBtn.textContent = "수정하기";
                        saveMemoBtn.dataset.editingId = memo.id;
                        // Show existing image if any
                        if (memo.imageUrl) {
                            memoImagePreviewImg.src = memo.imageUrl;
                            memoImagePreview.style.display = "block";
                            saveMemoBtn.dataset.existingImageUrl = memo.imageUrl;
                            saveMemoBtn.dataset.existingImagePath = memo.imagePath || "";
                        } else {
                            clearImagePreview();
                        }
                    };
                    
                    actions.appendChild(editBtn);
                    actions.appendChild(delBtn);
                    header.appendChild(actions);
                    
                    const content = document.createElement("div");
                    content.style.fontSize = "14px";
                    content.style.color = "#1f2937";
                    content.style.lineHeight = "1.5";
                    content.style.whiteSpace = "pre-wrap";
                    content.textContent = memo.text;
                    
                    div.appendChild(header);
                    div.appendChild(content);
                    
                    // Show image if attached
                    if (memo.imageUrl) {
                        const imgWrap = document.createElement("div");
                        imgWrap.style.marginTop = "10px";
                        const img = document.createElement("img");
                        img.src = memo.imageUrl;
                        img.alt = "첨부 이미지";
                        img.style = "width:100%; border-radius:8px; cursor:pointer; transition: opacity 0.2s;";
                        img.onmouseover = () => img.style.opacity = '0.85';
                        img.onmouseout = () => img.style.opacity = '1';
                        img.onclick = () => window.open(memo.imageUrl, '_blank');
                        imgWrap.appendChild(img);
                        div.appendChild(imgWrap);
                    }
                    
                    memoHistoryList.appendChild(div);
                });
            }
        }

        // Image preview helpers
        const memoImageInput = document.getElementById("memoImageInput");
        const memoImagePreview = document.getElementById("memoImagePreview");
        const memoImagePreviewImg = document.getElementById("memoImagePreviewImg");
        const memoImageRemoveBtn = document.getElementById("memoImageRemoveBtn");
        let pendingImageFile = null;

        function clearImagePreview() {
            pendingImageFile = null;
            memoImageInput.value = "";
            memoImagePreviewImg.src = "";
            memoImagePreview.style.display = "none";
            delete saveMemoBtn.dataset.existingImageUrl;
            delete saveMemoBtn.dataset.existingImagePath;
        }

        memoImageInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;
            pendingImageFile = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                memoImagePreviewImg.src = ev.target.result;
                memoImagePreview.style.display = "block";
            };
            reader.readAsDataURL(file);
        });

        memoImageRemoveBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            clearImagePreview();
        });

        // Ctrl+V paste support: paste image directly into memo modal
        document.addEventListener('paste', (e) => {
            if (memoModal.style.display === 'none') return; // only when modal is open
            const items = e.clipboardData?.items;
            if (!items) return;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (!file) continue;
                    pendingImageFile = file;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        memoImagePreviewImg.src = ev.target.result;
                        memoImagePreview.style.display = 'block';
                        // Flash the preview area to indicate success
                        memoImagePreview.style.outline = '3px solid #818cf8';
                        setTimeout(() => memoImagePreview.style.outline = 'none', 600);
                    };
                    reader.readAsDataURL(file);
                    break;
                }
            }
        });

        openMemoBtn.addEventListener("click", async () => {
            if (!currentItemCodeForMemo) return;
            memoDate.value = new Date().toISOString().split('T')[0];
            memoText.value = "";
            memoAuthor.value = "";
            saveMemoBtn.removeAttribute('data-editing-id');
            saveMemoBtn.textContent = "✅ 작성 완료";
            clearImagePreview();
            memoModal.style.display = "flex";
            
            memoHistoryList.innerHTML = '<div style="color:#6b7280; font-size:13px; text-align:center;">불러오는 중...</div>';
            if (window.fetchIssueMemos) {
                const memos = await window.fetchIssueMemos(currentItemCodeForMemo);
                renderMemoList(memos);
            }
        });

        saveMemoBtn.addEventListener("click", async () => {
            if (!currentItemCodeForMemo) return;
            const dateVal = memoDate.value;
            const textVal = memoText.value.trim();
            const authorVal = memoAuthor.value.trim();
            
            if (!textVal) {
                alert("특이사항을 입력해주세요.");
                return;
            }
            
            saveMemoBtn.disabled = true;
            
            // Upload image if a new one was selected
            let imageUrl = "";
            let imagePath = "";
            if (pendingImageFile) {
                saveMemoBtn.textContent = "이미지 업로드 중...";
                const result = await window.uploadMemoImage(pendingImageFile);
                if (result) { imageUrl = result.url; imagePath = result.path; }
            } else if (saveMemoBtn.dataset.existingImageUrl) {
                imageUrl = saveMemoBtn.dataset.existingImageUrl;
                imagePath = saveMemoBtn.dataset.existingImagePath || "";
            }
            
            saveMemoBtn.textContent = "저장 중...";
            
            if (saveMemoBtn.dataset.editingId) {
                if (window.updateIssueMemo) {
                    await window.updateIssueMemo(saveMemoBtn.dataset.editingId, dateVal, textVal, authorVal, imageUrl, imagePath);
                    saveMemoBtn.removeAttribute('data-editing-id');
                }
            } else {
                if (window.saveIssueMemo) {
                    await window.saveIssueMemo(currentItemCodeForMemo, dateVal, textVal, authorVal, imageUrl, imagePath);
                }
            }
            
            saveMemoBtn.textContent = "✅ 작성 완료";
            saveMemoBtn.disabled = false;
            
            if(typeof updateMemoBtnUI === 'function') updateMemoBtnUI();
            
            // Clear inputs for next memo
            memoText.value = "";
            memoDate.value = new Date().toISOString().split('T')[0];
            clearImagePreview();
            
            // Refresh list instead of closing modal
            if (window.fetchIssueMemos) {
                const memos = await window.fetchIssueMemos(currentItemCodeForMemo);
                renderMemoList(memos);
            }
        });

        window.addEventListener('firebaseReady', () => {
            if(typeof updateMemoBtnUI === 'function') updateMemoBtnUI();
            if(typeof colorMode !== 'undefined' && colorMode === 'issue' && typeof rebuildBinsFromInventory === 'function') {
                rebuildBinsFromInventory();
            }
        });

        clearSelectionCard();
        updateInventoryTable();
        updateClearSearchVisibility();
    </script>

<script>
                window.shipmentData = {};
        fetch('./shipmentData.json')
            .then(res => res.json())
            .then(data => { window.shipmentData = data; })
            .catch(err => console.warn('shipmentData fetch error', err));
            
        window.partnerData = {};
        fetch('./partnerData.json')
            .then(res => res.json())
            .then(data => { window.partnerData = data; })
            .catch(err => console.warn('partnerData fetch error', err));
</script>

    
</body>
